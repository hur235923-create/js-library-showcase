<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JS 라이브러리 쇼케이스</title>
  <link rel="stylesheet" href="css/style.css" />

  <!-- Three.js 및 애드온의 bare specifier 해석용 import map
       (쇼케이스는 lazy 로딩하므로 실제 fetch는 해당 탭을 열 때만 발생) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <span class="logo">JS Showcase</span>
      <nav class="tab-nav" id="tabNav" role="tablist" aria-label="라이브러리 탭">
        <!-- JS로 동적 생성 -->
      </nav>
    </div>
  </header>

  <!-- ── MAIN CONTENT ───────────────────────────────── -->
  <main class="main-content" id="mainContent" role="tabpanel">
    <!-- 선택된 쇼케이스의 init(container) 이 여기에 렌더링 -->
  </main>

  <script type="module" src="js/main.js"></script>
</body>
</html>
